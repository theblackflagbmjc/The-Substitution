# ==============================================================================
# The Substitution v1.0.0 — Training Configuration
# Brandon Michael Jeanpierre Corporation d/b/a The Black Flag
# Organization: theblackflagbmjc
#
# This configuration is tuned for the target hardware:
#   MacBook Pro M1Pro 2021 | 32GB RAM | 1TB storage
#
# For NVIDIA GPU systems, adjust batch_size and gradient_accumulation_steps
# based on available VRAM. The effective batch size should remain ~32.
# ==============================================================================

# --- Model ---
model:
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  model_type: "causal_lm"
  trust_remote_code: true
  dtype: "bfloat16"

# --- Quantization (QLoRA) ---
# 4-bit quantization reduces the 7B model from ~14GB to ~4GB in memory,
# making training feasible on the M1Pro 32GB target hardware.
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# --- Data ---
data:
  tokenized_dataset_path: "./data/tokenized"
  max_seq_length: 4096

# --- Training Hyperparameters ---
# These are tuned for the M1Pro 32GB environment.
# Effective batch size = per_device_batch_size * gradient_accumulation_steps = 1 * 32 = 32
training:
  output_dir: "./output/the-substitution-v1"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0

  # Precision
  bf16: true
  fp16: false
  tf32: false  # Not available on Apple Silicon

  # Memory optimization
  gradient_checkpointing: true
  optim: "adamw_torch"

  # Logging
  logging_steps: 10
  logging_first_step: true
  log_level: "info"

  # Evaluation
  eval_strategy: "steps"
  eval_steps: 500

  # Checkpointing
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Reproducibility
  seed: 42
  data_seed: 42

  # Reporting
  report_to: "wandb"

  # Performance
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: true
